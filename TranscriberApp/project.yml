name: TranscriberApp
options:
  bundleIdPrefix: com.szymonsypniewicz
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "1.0.0-rc1"
    CURRENT_PROJECT_VERSION: "2"
packages:
  TranscriberCore:
    path: ..
targets:
  TranscriberApp:
    type: application
    platform: macOS
    sources:
      - path: TranscriberApp
        excludes:
          - "Info.plist"
          - "TranscriberApp.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.szymonsypniewicz.transcriber
        PRODUCT_NAME: TranscriberApp
        INFOPLIST_FILE: TranscriberApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TranscriberApp/TranscriberApp.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: TranscriberCore
        product: TranscriberCore
