name: Scribe
options:
  bundleIdPrefix: com.szymonsypniewicz
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "1.0.0-rc4"
    CURRENT_PROJECT_VERSION: "5"
packages:
  TranscriberCore:
    path: ..
targets:
  Scribe:
    type: application
    platform: macOS
    sources:
      - path: Scribe
        excludes:
          - "Info.plist"
          - "Scribe.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.szymonsypniewicz.scribe
        PRODUCT_NAME: Scribe
        INFOPLIST_FILE: Scribe/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scribe/Scribe.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: TranscriberCore
        product: TranscriberCore
