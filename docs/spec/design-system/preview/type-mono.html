<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
</head>
<body data-theme="dark" style="margin:0;padding:28px 32px;background:#0a0a0a;display:flex;flex-direction:column;gap:22px;">
<style>
  .lockup {
    font-family: var(--font-mono);
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: oklch(0.96 0 0);
    line-height: 1;
  }
  .lockup .arrow { color: oklch(0.55 0 0); margin: 0 0.15em; }
  .lockup .v { color: oklch(0.78 0.07 255); }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 28px;
    align-items: end;
  }
  .grp { display: flex; flex-direction: column; gap: 8px; }
  .lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: oklch(0.45 0 0);
    text-transform: uppercase;
  }
  .num {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 400;
    color: oklch(0.94 0 0);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.015em;
    line-height: 1;
  }
  .num .u { color: oklch(0.55 0 0); font-size: 12px; margin-left: 4px; letter-spacing: 0; }
  .path {
    font-family: var(--font-mono);
    font-size: 13px;
    color: oklch(0.78 0 0);
  }
  .path .dim { color: oklch(0.50 0 0); }
  .path .v   { color: oklch(0.82 0.07 255); }
  .indicators { display: flex; flex-wrap: wrap; gap: 14px; }
</style>
  <div class="lockup">scribe <span class="arrow">→</span> <span class="v">agent</span></div>
  <div class="row">
    <div class="grp">
      <div class="lbl">ELAPSED</div>
      <div class="num">04:21<span class="u">min</span></div>
    </div>
    <div class="grp">
      <div class="lbl">PATH</div>
      <div class="path"><span class="dim">~/scribe/calls/</span><span class="v">q3-sync.json</span></div>
    </div>
    <div class="grp">
      <div class="lbl">STATUS</div>
      <div class="indicators">
        <span class="indicator indicator-ready"><span class="dot"></span>READY</span>
        <span class="indicator indicator-sent"><span class="dot"></span>SENT</span>
      </div>
    </div>
  </div>
</body>
</html>
