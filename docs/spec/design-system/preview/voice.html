<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Voice</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #000; padding: 28px 32px; font-family: var(--font-sans); color: #fff; }
  .quote { font-size: 22px; line-height: 1.25; letter-spacing: -0.025em; font-weight: 600; }
  .quote .dim { color: oklch(0.55 0 0); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: oklch(0.55 0 0); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 16px; }
</style>
</head>
<body>
  <div class="quote">Your agents are blind to half your day. <span class="dim">Scribe fixes that.</span></div>
  <div class="meta">VOICE · TERSE · SECOND-PERSON · NO HEDGING</div>
</body>
</html>
