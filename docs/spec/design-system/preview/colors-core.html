<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Core</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    min-height: 360px;
  }
  .block {
    position: relative;
    padding: 22px 22px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .role {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
    opacity: 0.65;
  }
  .name {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 0.92;
    margin: 0;
  }
  .val {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0;
    opacity: 0.85;
    margin-top: 8px;
  }
  .hex {
    position: absolute;
    top: 22px;
    right: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    opacity: 0.55;
  }

  /* Loud, saturated, full-bleed */
  .ink   { background: #0a0a0a; color: #fff; }
  .paper { background: #ffffff; color: #0a0a0a; }
  .slate { background: oklch(0.42 0.18 258); color: #fff; }
  .rust  { background: oklch(0.62 0.20 35); color: #fff; }

  .paper { box-shadow: inset 1px 0 0 var(--border), inset -1px 0 0 var(--border); }
</style>
</head>
<body>
  <div class="block ink">
    <span class="role">PRIMARY · DARK SURFACE</span>
    <span class="hex">#0A0A0A</span>
    <div>
      <h1 class="name">Ink</h1>
      <div class="val">var(--bg-dark)</div>
    </div>
  </div>
  <div class="block paper">
    <span class="role">PRIMARY · LIGHT SURFACE</span>
    <span class="hex">#FFFFFF</span>
    <div>
      <h1 class="name">Paper</h1>
      <div class="val">var(--bg-light)</div>
    </div>
  </div>
  <div class="block slate">
    <span class="role">ACCENT · LINKS, FOCUS</span>
    <span class="hex">oklch(.42 .18 258)</span>
    <div>
      <h1 class="name">Slate ink</h1>
      <div class="val">var(--accent)</div>
    </div>
  </div>
  <div class="block rust">
    <span class="role">LIVE · RECORDING</span>
    <span class="hex">oklch(.62 .20 35)</span>
    <div>
      <h1 class="name">Rust</h1>
      <div class="val">var(--recording)</div>
    </div>
  </div>
</body>
</html>
