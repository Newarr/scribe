<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; color: #000; padding: 24px 32px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 110px 1fr 100px; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .specimen { color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="label">H1</div><div class="specimen" style="font-size:36px;font-weight:600;letter-spacing:-0.025em;line-height:1.05">Capture every call</div><div class="meta">36 / 600</div></div>
  <div class="row"><div class="label">H2</div><div class="specimen" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">Section heading</div><div class="meta">24 / 600</div></div>
  <div class="row"><div class="label">H3</div><div class="specimen" style="font-size:18px;font-weight:600;letter-spacing:-0.015em">Subsection</div><div class="meta">18 / 600</div></div>
  <div class="row"><div class="label">Body</div><div class="specimen" style="font-size:14px;color:var(--fg-2);line-height:1.6">Sits in your menu bar, captures every call.</div><div class="meta">14 / 400</div></div>
  <div class="row"><div class="label">Caption</div><div class="specimen" style="font-size:12px;color:var(--fg-3)">Drafts, follow-ups, CRM updates, notes.</div><div class="meta">12 / 400</div></div>
</body>
</html>
