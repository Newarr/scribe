<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); padding: 24px 28px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 50px 1fr 60px; align-items: center; gap: 12px; padding: 4px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { height: 12px; background: var(--fg-1); border-radius: 2px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-2</div><div><div class="bar" style="width:4px"></div></div><div class="val">4px</div></div>
  <div class="row"><div class="name">space-4</div><div><div class="bar" style="width:8px"></div></div><div class="val">8px</div></div>
  <div class="row"><div class="name">space-6</div><div><div class="bar" style="width:16px"></div></div><div class="val">16px</div></div>
  <div class="row"><div class="name">space-8</div><div><div class="bar" style="width:24px"></div></div><div class="val">24px</div></div>
  <div class="row"><div class="name">space-10</div><div><div class="bar" style="width:40px"></div></div><div class="val">40px</div></div>
  <div class="row"><div class="name">space-12</div><div><div class="bar" style="width:64px"></div></div><div class="val">64px</div></div>
  <div class="row"><div class="name">space-14</div><div><div class="bar" style="width:96px"></div></div><div class="val">96px</div></div>
</body>
</html>
