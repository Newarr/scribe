<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--gray-50); padding: 28px; font-family: var(--font-sans); display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 88px; height: 60px; background: #fff; border-radius: 6px; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-menu)"></div><div class="name">menu</div></div>
</body>
</html>
