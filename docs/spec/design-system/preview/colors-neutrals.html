<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .step { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 6px; }
  .step .n { font-family: var(--font-mono); font-size: 10px; }
  .light .n { color: rgba(0,0,0,0.55); }
  .dark .n { color: rgba(255,255,255,0.6); }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Gray scale · 50 → 950</div>
  <div class="row">
    <div class="step light" style="background:oklch(0.985 0 0)"><span class="n">50</span></div>
    <div class="step light" style="background:oklch(0.97 0 0)"><span class="n">100</span></div>
    <div class="step light" style="background:oklch(0.922 0 0)"><span class="n">200</span></div>
    <div class="step light" style="background:oklch(0.87 0 0)"><span class="n">300</span></div>
    <div class="step light" style="background:oklch(0.708 0 0)"><span class="n">400</span></div>
    <div class="step dark" style="background:oklch(0.556 0 0)"><span class="n">500</span></div>
    <div class="step dark" style="background:oklch(0.439 0 0)"><span class="n">600</span></div>
    <div class="step dark" style="background:oklch(0.371 0 0)"><span class="n">700</span></div>
    <div class="step dark" style="background:oklch(0.269 0 0)"><span class="n">800</span></div>
    <div class="step dark" style="background:oklch(0.205 0 0)"><span class="n">900</span></div>
    <div class="step dark" style="background:oklch(0.145 0 0)"><span class="n">950</span></div>
  </div>
</body>
</html>
