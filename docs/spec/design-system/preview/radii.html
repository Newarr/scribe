<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-sans); display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--fg-1); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="name">xs · 2</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">sm · 4</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">md · 6</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">lg · 8</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">xl · 12</div></div>
</body>
</html>
