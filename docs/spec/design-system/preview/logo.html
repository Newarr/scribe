<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; min-height: 200px; }
  .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; }
  .light { background: #fff; color: #000; }
  .dark { background: #000; color: #fff; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 26px; font-weight: 600; letter-spacing: -0.04em; }
  .logo svg { width: 28px; height: 28px; }
  .label { font-family: var(--font-mono); font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="pane light">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect x="6" y="10" width="2.5" height="12" rx="1" fill="currentColor"/><rect x="11" y="6" width="2.5" height="20" rx="1" fill="currentColor"/><rect x="16" y="2" width="2.5" height="28" rx="1" fill="currentColor"/><rect x="21" y="6" width="2.5" height="20" rx="1" fill="currentColor"/><rect x="26" y="10" width="2.5" height="12" rx="1" fill="currentColor"/></svg>
      <span>scribe</span>
    </div>
    <div class="label">LIGHT</div>
  </div>
  <div class="pane dark">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect x="6" y="10" width="2.5" height="12" rx="1" fill="currentColor"/><rect x="11" y="6" width="2.5" height="20" rx="1" fill="currentColor"/><rect x="16" y="2" width="2.5" height="28" rx="1" fill="currentColor"/><rect x="21" y="6" width="2.5" height="20" rx="1" fill="currentColor"/><rect x="26" y="10" width="2.5" height="12" rx="1" fill="currentColor"/></svg>
      <span>scribe</span>
    </div>
    <div class="label">DARK</div>
  </div>
</body>
</html>
