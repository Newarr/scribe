<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Menu rows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
</head>
<body data-theme="dark" style="margin:0;padding:18px 20px;background:#0a0a0a;">
<style>
  .menu {
    background: oklch(0.10 0 0);
    border: 1px solid var(--card-border-dark);
    border-radius: 10px;
    padding: 6px;
  }
  .row {
    position: relative;
    display: grid;
    grid-template-columns: 24px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 9px 12px 9px 10px;
    border-radius: 6px;
    cursor: default;
    transition: background 120ms var(--ease-out);
  }
  .row:hover { background: oklch(0.14 0 0); }
  .row.active { background: oklch(0.16 0 0); }
  .row.active::before {
    content: "";
    position: absolute; left: 2px; top: 10px; bottom: 10px;
    width: 2px;
    border-radius: 99px;
    background: var(--live-dot);
  }

  .badge {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: oklch(0.14 0 0);
    border: 1px solid var(--card-border-dark);
    display: flex; align-items: center; justify-content: center;
    color: oklch(0.78 0 0);
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0;
  }
  .badge.live {
    background: oklch(0.16 0.05 35);
    border-color: oklch(0.28 0.07 35);
  }
  .badge.live .pulse {
    width: 7px; height: 7px; border-radius: 99px;
    background: var(--live-dot);
    box-shadow: 0 0 0 0 var(--live-dot-glow);
    animation: live-ping 1.6s var(--ease-out) infinite;
  }

  .main { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .title { font-size: 13px; color: #fff; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { font-family: var(--font-mono); font-size: 10px; color: oklch(0.55 0 0); letter-spacing: 0.04em; }

  .dur {
    font-family: var(--font-mono); font-size: 11px;
    color: oklch(0.78 0 0); font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .when {
    font-family: var(--font-mono); font-size: 10px;
    color: oklch(0.50 0 0); letter-spacing: 0.08em;
    min-width: 42px; text-align: right;
  }
  .when.live { color: var(--live-dot); }
</style>
  <div class="menu">
    <div class="row active">
      <div class="badge live"><span class="pulse"></span></div>
      <div class="main"><div class="title">Acme Q3 sync</div><div class="sub">zoom · 3 speakers</div></div>
      <div class="dur">04:21</div>
      <div class="when live">LIVE</div>
    </div>
    <div class="row">
      <div class="badge">M</div>
      <div class="main"><div class="title">Onboarding — J. Patel</div><div class="sub">meet · webhook → zapier</div></div>
      <div class="dur">12m</div>
      <div class="when">YDAY</div>
    </div>
    <div class="row">
      <div class="badge">Z</div>
      <div class="main"><div class="title">Weekly standup</div><div class="sub">zoom · 6 speakers</div></div>
      <div class="dur">26m</div>
      <div class="when">MON</div>
    </div>
    <div class="row">
      <div class="badge">F</div>
      <div class="main"><div class="title">Vendor — Stripe</div><div class="sub">facetime · failed retry</div></div>
      <div class="dur">18m</div>
      <div class="when">MON</div>
    </div>
  </div>
</body>
</html>
