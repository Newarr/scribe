<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  input, select, textarea { font-family: var(--font-sans); font-size: 14px; height: 34px; padding: 0 12px; background: var(--bg); color: var(--fg-1); border: 1px solid var(--border); border-radius: 6px; outline: none; transition: border-color 120ms; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(0.62 0.19 250 / 0.15); }
  input::placeholder { color: var(--fg-4); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div class="field"><label>Webhook URL</label><input type="text" placeholder="https://api.example.com/calls" value="https://hooks.zapier.com/abc123"/></div>
  <div class="row">
    <div class="field"><label>Format</label><select><option>JSON</option><option>Markdown</option><option>Plain text</option></select></div>
    <div class="field"><label>API key</label><input type="password" value="sk-•••••••••••••"/></div>
  </div>
</body>
</html>
