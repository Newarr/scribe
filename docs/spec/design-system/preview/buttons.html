<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body {
    margin: 0;
    background: var(--bg);
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
</style>
</head>
<body>
  <div class="group">
    <div class="eyebrow">DEFAULT · HOVER &amp; PRESS &amp; ARROW SLIDE</div>
    <div class="row">
      <button class="btn btn-primary">Install for Mac <span class="arrow">→</span></button>
      <button class="btn btn-secondary">Open transcript</button>
      <button class="btn btn-ghost">Cancel</button>
    </div>
  </div>
  <div class="group">
    <div class="eyebrow">SMALL · LOADING &amp; DANGER GLOW</div>
    <div class="row">
      <button class="btn btn-primary btn-sm btn-loading">Sending…</button>
      <button class="btn btn-secondary btn-sm">Copy</button>
      <button class="btn btn-danger btn-sm">Delete</button>
    </div>
  </div>
  <script src="../btn-sheen.js"></script>
</body>
</html>
