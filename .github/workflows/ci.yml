name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        # mlx-audio-swift requires swift-tools-version:6.2, which ships with
        # Xcode 26. The macos-15 image bundles Xcode 26.3 alongside Xcode 16.
        run: sudo xcode-select -s /Applications/Xcode_26.3.app
      - name: Build core
        run: swift build
      - name: Test core
        run: swift test --enable-code-coverage
      - name: Build app
        run: |
          xcodebuild \
            -project TranscriberApp/Scribe.xcodeproj \
            -scheme Scribe \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
